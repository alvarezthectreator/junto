app = "junto"

# Let flyctl build from the local Dockerfile (no image ref here)
[build]

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[env]
  PORT = "5000"
  NODE_ENV = "production"
  DB_PATH = "./junto.db"
  UPLOAD_STORAGE_DIR = "/data/uploads"
